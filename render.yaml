services:
  # Backend Web Service
  - type: web
    name: school-monitoring-backend
    env: node
    plan: free
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: CORS_ORIGIN
        value: https://adhikarilaxman.github.io/school-monitoring-system
      - key: JWT_SECRET
        generateValue: true
      - key: MAX_FILE_SIZE
        value: 10485760
    disk:
      name: uploads
      mountPath: /opt/render/project/backend/uploads
      sizeGB: 1
